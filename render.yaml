services:
  - type: web
    name: stray-pet-rescue-reports
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_TOKEN
        sync: false
    disk:
      name: report-data
      mountPath: /var/data
      sizeGB: 1

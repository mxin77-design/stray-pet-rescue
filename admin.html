<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台｜流浪猫狗线索</title>
  <style>
    :root {
      --bg: #fff8ef;
      --card: rgba(255, 255, 255, 0.88);
      --line: rgba(93, 72, 58, 0.13);
      --text: #3d322b;
      --muted: #766a62;
      --primary: #f28b64;
      --primary-dark: #d96a44;
      --ok: #4d8f7e;
      --shadow: 0 12px 30px rgba(93, 72, 58, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 209, 102, 0.25), transparent 24%),
        radial-gradient(circle at right, rgba(131, 197, 190, 0.18), transparent 28%),
        var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .wrap { width: min(1180px, calc(100% - 28px)); margin: 0 auto; padding: 28px 0 40px; }
    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
    }
    h1 { margin: 0; font-size: clamp(1.8rem, 4vw, 2.8rem); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    a, button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }
    a.secondary, button.secondary {
      background: #fff;
      color: var(--primary-dark);
      border: 1px solid rgba(217, 106, 68, 0.24);
    }
    .panel, .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }
    .panel { padding: 18px; margin-bottom: 16px; }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }
    label { display: grid; gap: 6px; color: var(--muted); font-weight: 800; }
    input, select {
      width: 100%;
      border: 1px solid rgba(93,72,58,.16);
      border-radius: 14px;
      padding: 11px 12px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }
    .status {
      color: var(--muted);
      margin-top: 12px;
      min-height: 1.6em;
      font-weight: 700;
    }
    .cards { display: grid; gap: 14px; }
    .card { padding: 18px; }
    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .card h3 { margin: 0 0 8px; font-size: 1.22rem; }
    .meta, .card-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      border-radius: 999px;
      padding: 5px 10px;
      background: rgba(131,197,190,.18);
      color: #3f7770;
      font-size: .86rem;
      font-weight: 800;
    }
    .urgent { background: rgba(242,139,100,.16); color: #a3492b; }
    .status-tag { background: rgba(255,209,102,.28); color: #8a5b1f; }
    dl {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 6px 10px;
      margin: 0 0 14px;
    }
    dt { color: var(--muted); font-weight: 800; }
    dd { margin: 0; word-break: break-word; }
    .status-row {
      display: grid;
      grid-template-columns: minmax(0, 220px) auto auto;
      gap: 10px;
      align-items: center;
    }
    .mini-status { font-size: .9rem; color: var(--muted); }
    .empty { text-align: center; color: var(--muted); padding: 38px; }
    @media (max-width: 820px) {
      header, .toolbar, .status-row, dl { display: grid; grid-template-columns: 1fr; }
      .card-head { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>流浪猫狗线索后台</h1>
        <p style="margin: 8px 0 0; color: #766a62;">在这里查看记录、筛选关键词，并更新公开状态。</p>
      </div>
      <div class="actions">
        <a class="secondary" href="/pets.html">公开列表</a>
        <a href="/">返回填写页</a>
      </div>
    </header>

    <section class="panel">
      <div class="toolbar">
        <label>后台访问口令<input id="token" type="password" placeholder="默认开发口令：change-me" /></label>
        <label>筛选关键词<input id="keyword" placeholder="城市、区域、动物类型、描述关键词" /></label>
        <button id="loadBtn">加载记录</button>
      </div>
      <p class="status" id="status">请输入后台口令后加载。若要使用状态功能，请确保数据库已经运行 `supabase-upgrade-status.sql`。</p>
    </section>

    <main class="cards" id="cards"></main>
  </div>

  <script>
    const REPORT_STATUSES = ['待核实', '待救助', '救助中', '寻主中', '可领养', '已安置'];
    const tokenInput = document.getElementById('token');
    const keywordInput = document.getElementById('keyword');
    const statusEl = document.getElementById('status');
    const cardsEl = document.getElementById('cards');
    const loadBtn = document.getElementById('loadBtn');
    tokenInput.value = localStorage.getItem('adminToken') || '';

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"]/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[s]));
    }

    function statusOptions(current) {
      return REPORT_STATUSES.map(status => `<option value="${status}" ${status === current ? 'selected' : ''}>${status}</option>`).join('');
    }

    function render(items) {
      if (!items.length) {
        cardsEl.innerHTML = '<div class="panel empty">暂无记录或筛选后无结果。</div>';
        return;
      }

      cardsEl.innerHTML = items.map(item => `
        <article class="card">
          <div class="card-head">
            <div>
              <h3>${escapeHtml(item.animalType)}｜${escapeHtml(item.city)} ${escapeHtml(item.district)}</h3>
              <div class="meta">
                <span class="tag status-tag">${escapeHtml(item.status || '待核实')}</span>
                <span class="tag urgent">${escapeHtml(item.urgency)}</span>
                <span class="tag">编号：${escapeHtml(item.id)}</span>
                <span class="tag">提交：${escapeHtml(new Date(item.createdAt).toLocaleString())}</span>
              </div>
            </div>
            <div class="card-actions">
              <a class="secondary" href="/pet.html?id=${encodeURIComponent(item.id)}" target="_blank" rel="noopener">公开详情</a>
            </div>
          </div>

          <dl>
            <dt>详细位置</dt><dd>${escapeHtml(item.location)}</dd>
            <dt>看到时间</dt><dd>${escapeHtml(item.seenAt)}</dd>
            <dt>描述</dt><dd>${escapeHtml(item.description)}</dd>
            <dt>图片链接</dt><dd>${item.mediaUrl ? `<a href="${escapeHtml(item.mediaUrl)}" target="_blank" rel="noopener">${escapeHtml(item.mediaUrl)}</a>` : '无'}</dd>
            <dt>提交者</dt><dd>${escapeHtml(item.contactName)}</dd>
            <dt>联系方式</dt><dd>${escapeHtml(item.contactInfo)}</dd>
          </dl>

          <div class="status-row">
            <label>公开状态
              <select data-status-id="${escapeHtml(item.id)}">
                ${statusOptions(item.status || '待核实')}
              </select>
            </label>
            <button data-save-id="${escapeHtml(item.id)}">保存状态</button>
            <span class="mini-status" id="save-status-${escapeHtml(item.id)}">保存后，公开列表会同步展示这个状态。</span>
          </div>
        </article>
      `).join('');
    }

    async function loadReports() {
      const token = tokenInput.value.trim();
      localStorage.setItem('adminToken', token);
      statusEl.textContent = '正在加载……';
      try {
        const keyword = keywordInput.value.trim();
        const response = await fetch('/api/reports?keyword=' + encodeURIComponent(keyword), {
          headers: { 'x-admin-token': token }
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || '加载失败');
        statusEl.textContent = `共 ${data.items.length} 条记录。`;
        render(data.items);
      } catch (error) {
        statusEl.textContent = '加载失败：' + (error.message || '口令不正确，或后台服务未启动。');
        cardsEl.innerHTML = '';
      }
    }

    async function saveStatus(id) {
      const token = tokenInput.value.trim();
      const select = document.querySelector(`[data-status-id="${CSS.escape(id)}"]`);
      const helper = document.getElementById(`save-status-${id}`);
      if (!select) return;

      helper.textContent = '正在保存状态……';
      try {
        const response = await fetch('/api/reports', {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-token': token
          },
          body: JSON.stringify({ id, status: select.value })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || '保存失败');
        helper.textContent = `已保存为“${data.item?.status || select.value}”。`;
      } catch (error) {
        helper.textContent = error.message || '保存失败';
      }
    }

    cardsEl.addEventListener('click', event => {
      const button = event.target.closest('[data-save-id]');
      if (!button) return;
      saveStatus(button.getAttribute('data-save-id'));
    });

    loadBtn.addEventListener('click', loadReports);
    keywordInput.addEventListener('keydown', event => { if (event.key === 'Enter') loadReports(); });
  </script>
</body>
</html>
